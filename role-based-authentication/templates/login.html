{% extends 'base.html' %}

{% block content %}
<h2>Login</h2>
{% if form.errors %}
<div class="alert">Your username and password didn't match. Please try again.</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>
<p>Don't have an account? <a href="{% url 'register' %}">Register here</a>.</p>
{% endblock %}
