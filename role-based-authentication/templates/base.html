<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role-Based Auth App</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        nav { background-color: #333; color: white; padding: 1rem; }
        nav a { color: white; text-decoration: none; margin-right: 15px; }
        .container { padding: 2rem; }
        form { display: flex; flex-direction: column; max-width: 300px; }
        form p { margin-bottom: 15px; }
        button { padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .alert { padding: 10px; background-color: #f8d7da; color: #721c24; margin-bottom: 15px; }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <span>Welcome, {{ user.username }} ({{ user.groups.first.name }})</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline; margin-left: 15px;">
            {% csrf_token %}
            <button type="submit" style="background: none; border: none; color: white; padding: 0; text-decoration: underline; cursor: pointer;">Logout</button>
        </form>
    {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'register' %}">Register</a>
    {% endif %}
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
