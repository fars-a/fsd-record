<!DOCTYPE html>
<html>
<head>
    <title>Feedback List</title>
</head>
<body>
    <h2>All Feedback</h2>

    {% for feedback in feedbacks %}
        <div>
            <h4>{{ feedback.name }} (Rating: {{ feedback.rating }}/5)</h4>
            <p>{{ feedback.message }}</p>
            <small>{{ feedback.submitted_at }}</small>
            <hr>
        </div>
    {% endfor %}
</body>
</html>
