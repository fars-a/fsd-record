<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <title>Edit Product</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">The Journal Store</a>
      <div>
        <a href="products.html" class="btn btn-sm me-2">Shop</a>
        <a href="cart.html" class="btn btn-sm me-2">Cart</a>
        <a href="login.html" class="btn btn-sm me-2">Login</a>
        <a href="register.html" class="btn btn-primary btn-sm rounded-pill">Join</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card p-5 col-md-5 mx-auto">
      <h3 class="text-center mb-4 fst-italic">Edit Product</h3>

      <form id="editProductForm">
        <input type="hidden" id="editProductId">
        <input type="text" id="editPname" class="form-control mb-3" placeholder="Product Name" required>
        <input type="number" step="0.01" min="0" id="editPrice" class="form-control mb-3" placeholder="Price (₹)"
          required>
        <input type="file" id="editPImage" accept="image/*" class="form-control mb-4">

        <button class="btn btn-primary w-100">Update Product</button>
      </form>
    </div>
  </div>

  <script src="js/product.js"></script>
</body>

</html>
